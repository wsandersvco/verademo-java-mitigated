name: Veracode Pipeline Scan And SARIF Upload

on: [workflow_dispatch, pull_request]

env:
  ARTIFACT_NAME: maven-build
  ARTIFACT_PATH: app/target/*.war

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "maven"
          settings-path: ${{ github.workspace }}

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build with Maven (skip tests)
        working-directory: app
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 3

  pipeline_scan:
    needs: build
    runs-on: ubuntu-latest
    name: Veracode Pipeline Scan
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: get archive
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: pipeline-scan action step
        id: pipeline-scan
        uses: veracode/Veracode-pipeline-scan-action@esd-true
        with:
          vid: ${{ secrets.VID }}
          vkey: ${{ secrets.VKEY }}
          file: "verademo.war"
          veracode_policy_name: "Veracode Recommended Very High"
          debug: 1
          fail_build: false

  results_to_sarif:
    needs: pipeline_scan
    runs-on: ubuntu-latest
    name: Import Pipeline Results to SARIF
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: Get scan results
        uses: actions/download-artifact@v6
        with:
          name: "Veracode Pipeline-Scan Results"

      - name: Convert pipeline scan output to SARIF format
        id: convert
        uses: Veracode/veracode-pipeline-scan-results-to-sarif@v2.0.4
        with:
          results-json: filtered_results.json
          output-results-sarif: veracode-results.sarif
          source-base-path-1: "^com/:src/main/java/com/"
          source-base-path-2: "^WEB-INF:src/main/webapp/WEB-INF"
          repo_owner: ${{ github.repository_owner }}
          # repo_name: ${{ github.event.repository.name }}
          commitSHA: ${{ github.sha }}
          ref: ${{ github.ref }}
          githubToken: ${{ github.token }}

      - name: Upload SARIF
        id: upload
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: veracode-results.sarif
          category: pipeline-scan
