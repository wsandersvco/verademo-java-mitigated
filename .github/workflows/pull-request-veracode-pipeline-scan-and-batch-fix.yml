name: Veracode Pipeline Scan And Batch Fix

on: workflow_dispatch

env:
  ARTIFACT_NAME: maven-build
  ARTIFACT_PATH: app/target/*.war

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "maven"
          settings-path: ${{ github.workspace }}

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Build with Maven (skip tests)
        working-directory: app
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 3

  pipeline_scan:
    needs: build
    runs-on: ubuntu-latest
    name: Veracode Pipeline Scan
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: get archive
        uses: actions/download-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: pipeline-scan action step
        id: pipeline-scan
        uses: veracode/Veracode-pipeline-scan-action@esd-true
        with:
          vid: ${{ secrets.VID }}
          vkey: ${{ secrets.VKEY }}
          file: "verademo.war"
          veracode_policy_name: "Veracode Recommended Very High"
          debug: 1
          fail_build: false

  veracode-fix:
    runs-on: ubuntu-latest
    needs: pipeline_scan
    name: Veracode Fix
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: get flaw file
        uses: actions/download-artifact@v6
        with:
          name: Veracode Pipeline-Scan Results
          
      - name: Create fixes from static findings
        id: convert
        uses: Veracode/veracode-fix@v1.0.4
        with:
          access_token: ${{ secrets.VERACODE_FIX_PAT }}
          inputFile: filtered_results.json
          vid: ${{ secrets.VID }}
          vkey: ${{ secrets.VKEY }}
          source_base_path_1: "com/:app/src/main/java/com/"
          source_base_path_2: "WEB-INF:app/src/main/webapp/WEB-INF"
          language: java
          prComment: true
          fixType: batch
          createPR: true
          debug: true
